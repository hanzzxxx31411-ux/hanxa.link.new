<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Hanxa Link</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600;700;800;900&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
/* ============================================================
   HANXA LINK — token system
   bg-void #05060c | bg-panel rgba glass | cyan #00f6ff
   magenta #ff2bd6 | violet #8b5cf6 | amber #ffb703
   display: Orbitron | body: Rajdhani | mono: Share Tech Mono
   ============================================================ */
:root{
  --bg-void:#05060c;
  --bg-deep:#090c16;
  --cyan:#00f6ff;
  --magenta:#ff2bd6;
  --violet:#8b5cf6;
  --amber:#ffb703;
  --danger:#ff4d6d;
  --text-hi:#eaf6ff;
  --text-mid:#93a4c3;
  --text-dim:#5a6787;
  --glass:rgba(16,20,36,0.55);
  --glass-brd:rgba(120,180,255,0.14);
  --radius:16px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  min-height:100vh;
  background:var(--bg-void);
  color:var(--text-hi);
  font-family:'Rajdhani',sans-serif;
  overflow-x:hidden;
  position:relative;
}
::selection{background:var(--cyan);color:#000;}
::-webkit-scrollbar{width:8px;}
::-webkit-scrollbar-track{background:var(--bg-void);}
::-webkit-scrollbar-thumb{background:linear-gradient(var(--cyan),var(--violet));border-radius:8px;}

a{color:inherit;text-decoration:none;}
button{font-family:inherit;cursor:pointer;}
button:focus-visible, a:focus-visible, input:focus-visible{
  outline:2px solid var(--cyan);
  outline-offset:3px;
}

@media (prefers-reduced-motion: reduce){
  *{animation-duration:0.001ms !important; animation-iteration-count:1 !important; transition-duration:0.001ms !important;}
}

/* ---------- background: grid floor + glow blobs + particles ---------- */
.bg-layer{position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden;}
.bg-grid{
  position:absolute; inset:-10% -10% -10% -10%;
  background-image:
    linear-gradient(rgba(0,246,255,0.09) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,246,255,0.09) 1px, transparent 1px);
  background-size:46px 46px;
  transform:perspective(500px) rotateX(58deg);
  transform-origin:bottom;
  animation:gridScroll 6s linear infinite;
  opacity:0.5;
}
@keyframes gridScroll{ from{background-position:0 0,0 0;} to{background-position:0 46px,46px 0;} }
.bg-glow{position:absolute; border-radius:50%; filter:blur(90px); opacity:0.35; animation:float 14s ease-in-out infinite;}
.bg-glow.c1{width:420px;height:420px; background:var(--magenta); top:-8%; left:-10%; animation-delay:0s;}
.bg-glow.c2{width:480px;height:480px; background:var(--cyan); bottom:-12%; right:-10%; animation-delay:3s;}
.bg-glow.c3{width:320px;height:320px; background:var(--violet); top:40%; left:60%; animation-delay:6s;}
@keyframes float{
  0%,100%{transform:translate(0,0) scale(1);}
  50%{transform:translate(30px,-40px) scale(1.12);}
}
#particleCanvas{position:absolute; inset:0; width:100%; height:100%;}
.bg-fade{position:absolute; inset:0; background:radial-gradient(ellipse at center, transparent 0%, var(--bg-void) 78%);}

/* ---------- loader ---------- */
#loader{
  position:fixed; inset:0; z-index:999; background:var(--bg-void);
  display:flex; align-items:center; justify-content:center; flex-direction:column; gap:18px;
  transition:opacity .6s ease, visibility .6s ease;
}
#loader.hide{opacity:0; visibility:hidden;}
.loader-ring{
  width:74px; height:74px; border-radius:50%;
  border:2px solid rgba(0,246,255,0.15);
  border-top-color:var(--cyan);
  border-right-color:var(--magenta);
  animation:spin 1s linear infinite;
  position:relative;
}
.loader-ring::after{
  content:''; position:absolute; inset:12px; border-radius:50%;
  border:2px solid rgba(139,92,246,0.2); border-bottom-color:var(--violet);
  animation:spin 1.4s linear infinite reverse;
}
@keyframes spin{to{transform:rotate(360deg);}}
.loader-text{
  font-family:'Share Tech Mono',monospace; letter-spacing:4px; font-size:12px;
  color:var(--cyan); text-transform:uppercase;
}
.loader-bar{width:180px; height:2px; background:rgba(255,255,255,0.08); overflow:hidden; border-radius:2px;}
.loader-bar span{display:block; height:100%; width:40%; background:linear-gradient(90deg,var(--cyan),var(--magenta)); animation:loaderMove 1s ease-in-out infinite;}
@keyframes loaderMove{0%{margin-left:-40%;} 100%{margin-left:100%;}}

/* ---------- layout shell ---------- */
.app{position:relative; z-index:1; min-height:100vh;}
.wrap{max-width:520px; margin:0 auto; padding:56px 20px 40px;}

/* ---------- profile header ---------- */
.avatar-frame{
  width:104px; height:104px; margin:0 auto 18px; position:relative;
  display:flex; align-items:center; justify-content:center;
}
.avatar-frame::before{
  content:''; position:absolute; inset:-6px; border-radius:50%;
  background:conic-gradient(from 0deg, var(--cyan), var(--magenta), var(--violet), var(--cyan));
  animation:spin 5s linear infinite;
  filter:blur(1px);
}
.avatar-frame::after{
  content:''; position:absolute; inset:-6px; border-radius:50%;
  box-shadow:0 0 30px 4px rgba(0,246,255,0.35);
}
.avatar-inner{
  position:relative; z-index:1; width:96px; height:96px; border-radius:50%;
  background:radial-gradient(circle at 30% 25%, #1c2340, #05060c 70%);
  display:flex; align-items:center; justify-content:center;
  font-family:'Orbitron',sans-serif; font-weight:800; font-size:34px;
  color:var(--cyan); text-shadow:0 0 18px rgba(0,246,255,0.7);
  border:1px solid rgba(255,255,255,0.08);
}
.profile-name{
  text-align:center; font-family:'Orbitron',sans-serif; font-weight:800;
  font-size:26px; letter-spacing:2px; margin:0;
  background:linear-gradient(90deg,var(--cyan),#bff8ff 40%,var(--magenta));
  -webkit-background-clip:text; background-clip:text; color:transparent;
  text-shadow:0 0 30px rgba(0,246,255,0.25);
}
.profile-bio{
  text-align:center; color:var(--text-mid); font-size:15.5px; margin:8px 0 0;
  font-weight:500; letter-spacing:0.3px;
}
.status-pill{
  display:flex; align-items:center; justify-content:center; gap:8px;
  margin:16px auto 0; width:fit-content; padding:6px 14px;
  border:1px solid rgba(0,246,255,0.25); border-radius:100px;
  background:rgba(0,246,255,0.05);
  font-family:'Share Tech Mono',monospace; font-size:11px; letter-spacing:2px;
  color:var(--cyan); text-transform:uppercase;
}
.status-dot{width:7px; height:7px; border-radius:50%; background:var(--cyan); box-shadow:0 0 8px 2px var(--cyan); animation:pulse 1.6s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;} 50%{opacity:0.35;}}

/* ---------- link cards ---------- */
.links{margin-top:34px; display:flex; flex-direction:column; gap:14px;}
.link-card{
  position:relative; display:flex; align-items:center; gap:14px;
  padding:16px 16px; border-radius:var(--radius);
  background:var(--glass); border:1px solid var(--glass-brd);
  backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
  overflow:hidden; isolation:isolate;
  transition:transform .35s cubic-bezier(.2,.8,.2,1), box-shadow .35s ease, border-color .35s ease;
  --accent:var(--cyan);
}
.link-card::before{
  content:''; position:absolute; left:0; top:0; bottom:0; width:3px;
  background:var(--accent); box-shadow:0 0 12px 1px var(--accent);
}
.link-card::after{
  content:''; position:absolute; inset:0; z-index:-1;
  background:linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.08) 45%, transparent 60%);
  transform:translateX(-120%);
  transition:transform .7s ease;
}
.link-card:hover{
  transform:translateY(-4px) scale(1.012);
  border-color:var(--accent);
  box-shadow:0 8px 28px -6px var(--accent), 0 0 0 1px var(--accent) inset;
}
.link-card:hover::after{transform:translateX(120%);}
.link-emoji{
  flex:0 0 auto; width:42px; height:42px; border-radius:12px;
  display:flex; align-items:center; justify-content:center; font-size:21px;
  background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.06);
}
.link-body{flex:1; min-width:0;}
.link-label{font-weight:700; font-size:16.5px; color:var(--text-hi); letter-spacing:0.3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.link-url{font-family:'Share Tech Mono',monospace; font-size:11px; color:var(--text-dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px;}
.copy-btn{
  flex:0 0 auto; width:36px; height:36px; border-radius:10px; border:1px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.03); color:var(--text-mid); font-size:15px;
  display:flex; align-items:center; justify-content:center; transition:all .25s ease;
}
.copy-btn:hover{border-color:var(--accent); color:var(--accent); box-shadow:0 0 10px -2px var(--accent);}
.copy-btn.copied{color:var(--cyan); border-color:var(--cyan);}

.empty-state{
  text-align:center; padding:40px 20px; color:var(--text-dim);
  font-family:'Share Tech Mono',monospace; font-size:12.5px; letter-spacing:1px;
  border:1px dashed rgba(255,255,255,0.12); border-radius:var(--radius);
}

.footer-tag{
  margin-top:44px; text-align:center; font-family:'Share Tech Mono',monospace;
  font-size:11px; letter-spacing:3px; color:var(--text-dim); text-transform:uppercase;
}
.footer-tag span{color:var(--violet);}

/* ---------- admin: shared bits ---------- */
.admin-wrap{max-width:640px; margin:0 auto; padding:40px 20px 60px;}
.panel{
  background:var(--glass); border:1px solid var(--glass-brd); border-radius:var(--radius);
  backdrop-filter:blur(14px); padding:26px;
}
.eyebrow{
  font-family:'Share Tech Mono',monospace; font-size:11px; letter-spacing:4px;
  color:var(--magenta); text-transform:uppercase; margin:0 0 6px;
}
.h-title{font-family:'Orbitron',sans-serif; font-weight:800; font-size:22px; margin:0 0 20px; color:var(--text-hi);}

.field{margin-bottom:16px;}
.field label{
  display:block; font-family:'Share Tech Mono',monospace; font-size:10.5px;
  letter-spacing:2px; color:var(--text-mid); text-transform:uppercase; margin-bottom:6px;
}
.field input{
  width:100%; padding:11px 13px; border-radius:10px; border:1px solid rgba(255,255,255,0.12);
  background:rgba(255,255,255,0.03); color:var(--text-hi); font-family:'Rajdhani',sans-serif;
  font-size:15px; font-weight:600; transition:border-color .2s ease, box-shadow .2s ease;
}
.field input::placeholder{color:var(--text-dim);}
.field input:focus{border-color:var(--cyan); box-shadow:0 0 0 3px rgba(0,246,255,0.12); outline:none;}

.btn{
  font-family:'Orbitron',sans-serif; font-weight:700; font-size:12.5px; letter-spacing:1.5px;
  padding:12px 20px; border-radius:10px; border:1px solid transparent; text-transform:uppercase;
  transition:all .25s ease; display:inline-flex; align-items:center; justify-content:center; gap:8px;
}
.btn-primary{background:linear-gradient(90deg,var(--cyan),var(--violet)); color:#04060c; box-shadow:0 0 22px -4px var(--cyan);}
.btn-primary:hover{transform:translateY(-2px); box-shadow:0 6px 26px -4px var(--violet);}
.btn-ghost{background:rgba(255,255,255,0.03); color:var(--text-mid); border-color:rgba(255,255,255,0.12);}
.btn-ghost:hover{color:var(--text-hi); border-color:var(--cyan);}
.btn-danger{background:rgba(255,77,109,0.08); color:var(--danger); border-color:rgba(255,77,109,0.3);}
.btn-danger:hover{background:rgba(255,77,109,0.18); box-shadow:0 0 16px -4px var(--danger);}
.btn-icon{width:34px; height:34px; padding:0; border-radius:8px;}
.btn:disabled{opacity:0.4; cursor:not-allowed; transform:none !important;}

/* login screen */
.login-screen{min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;}
.login-card{width:100%; max-width:360px; text-align:center;}
.login-card .lock{font-size:34px; margin-bottom:6px; filter:drop-shadow(0 0 12px var(--cyan));}
.pin-input{
  width:100%; text-align:center; letter-spacing:12px; font-size:22px; font-family:'Share Tech Mono',monospace;
  padding:14px; border-radius:10px; border:1px solid rgba(255,255,255,0.12);
  background:rgba(255,255,255,0.03); color:var(--cyan); margin-bottom:14px;
}
.pin-input:focus{outline:none; border-color:var(--cyan); box-shadow:0 0 0 3px rgba(0,246,255,0.15);}
.shake{animation:shake .4s ease;}
@keyframes shake{
  10%,90%{transform:translateX(-2px);} 20%,80%{transform:translateX(4px);}
  30%,50%,70%{transform:translateX(-8px);} 40%,60%{transform:translateX(8px);}
}
.error-msg{color:var(--danger); font-family:'Share Tech Mono',monospace; font-size:11.5px; letter-spacing:1px; min-height:16px; margin-bottom:10px;}
.back-link{display:block; margin-top:18px; font-size:12.5px; color:var(--text-dim); font-family:'Share Tech Mono',monospace;}
.back-link:hover{color:var(--cyan);}

/* admin topbar */
.admin-topbar{
  position:sticky; top:0; z-index:5; display:flex; align-items:center; justify-content:space-between;
  padding:16px 20px; margin-bottom:26px; border-bottom:1px solid rgba(255,255,255,0.08);
  background:rgba(5,6,12,0.75); backdrop-filter:blur(10px);
}
.admin-topbar .logo{font-family:'Orbitron',sans-serif; font-weight:800; font-size:15px; letter-spacing:1px;}
.admin-topbar .logo span{color:var(--cyan);}

/* admin add form row */
.add-form{display:grid; grid-template-columns:70px 1fr 1fr auto; gap:10px; align-items:end;}
@media (max-width:560px){ .add-form{grid-template-columns:60px 1fr; } .add-form .field.url-field{grid-column:1/-1;} .add-form .submit-field{grid-column:1/-1;} }

/* link rows (admin list) */
.row-list{margin-top:22px; display:flex; flex-direction:column; gap:12px;}
.row-item{
  display:flex; align-items:center; gap:10px; padding:12px; border-radius:12px;
  background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.08);
  transition:border-color .2s ease, opacity .2s ease;
}
.row-item.inactive{opacity:0.42;}
.row-item:hover{border-color:rgba(0,246,255,0.3);}
.row-order{display:flex; flex-direction:column; gap:2px;}
.row-order button{
  width:22px; height:18px; font-size:10px; border:none; border-radius:4px;
  background:rgba(255,255,255,0.05); color:var(--text-mid);
}
.row-order button:hover{color:var(--cyan);}
.row-emoji-input{width:44px; text-align:center; padding:9px 4px; font-size:17px;}
.row-fields{flex:1; display:grid; grid-template-columns:1fr 1fr; gap:8px; min-width:0;}
.row-fields input{padding:8px 10px; font-size:13.5px;}
.row-actions{display:flex; align-items:center; gap:6px;}

/* toggle switch */
.switch{position:relative; width:42px; height:22px; flex:0 0 auto;}
.switch input{opacity:0; width:0; height:0;}
.slider{
  position:absolute; inset:0; background:rgba(255,255,255,0.1); border-radius:100px; cursor:pointer;
  transition:background .25s ease; border:1px solid rgba(255,255,255,0.14);
}
.slider::before{
  content:''; position:absolute; width:16px; height:16px; left:2px; top:2px; border-radius:50%;
  background:var(--text-mid); transition:transform .25s ease, background .25s ease;
}
.switch input:checked + .slider{background:rgba(0,246,255,0.25); border-color:var(--cyan);}
.switch input:checked + .slider::before{transform:translateX(20px); background:var(--cyan); box-shadow:0 0 8px var(--cyan);}

.hint{font-family:'Share Tech Mono',monospace; font-size:11px; color:var(--text-dim); margin-top:18px; line-height:1.7;}
.toast{
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px); opacity:0;
  background:#0b0f1c; border:1px solid var(--cyan); color:var(--cyan); padding:10px 18px; border-radius:10px;
  font-family:'Share Tech Mono',monospace; font-size:12px; letter-spacing:1px; z-index:50;
  transition:all .3s ease; box-shadow:0 0 20px -4px var(--cyan); pointer-events:none;
}
.toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<!-- ambient cyberpunk background -->
<div class="bg-layer">
  <div class="bg-glow c1"></div>
  <div class="bg-glow c2"></div>
  <div class="bg-glow c3"></div>
  <div class="bg-grid"></div>
  <canvas id="particleCanvas"></canvas>
  <div class="bg-fade"></div>
</div>

<!-- boot loader -->
<div id="loader">
  <div class="loader-ring"></div>
  <div class="loader-text">Initializing Hanxa Link…</div>
  <div class="loader-bar"><span></span></div>
</div>

<div class="app" id="app"></div>
<div class="toast" id="toast"></div>

<script>
(function(){
"use strict";

/* ================= CONFIG — edit freely ================= */
const CONFIG = {
  profileInitial: "H",
  name: "HANXA",
  bio: "Building tomorrow, today · Full-stack Developer",
  adminRoute: "#hanxa-admin-9x7",     // secret admin URL — change this before sharing
  adminPin: "1234",                    // client-side PIN — change before deploying, see note in dashboard
  storageKey: "hanxa_links_v1",
  sessionFlag: "hanxa_admin_session",  // in-memory only, not persisted across reloads
  accentCycle: ["#00f6ff", "#ff2bd6", "#8b5cf6", "#ffb703"],
  defaultLinks: [
    { id: "l1", emoji: "🎮", label: "Gaming Channel", url: "https://twitch.tv/", active: true },
    { id: "l2", emoji: "💻", label: "Website Gabut", url: "https://hanzzxxx31411-ux.github.io/hanz.my.id/", active: true },
    { id: "l3", emoji: "📱", label: "TikTok", url: "https://tiktok.com/@hanzxtq", active: true },
    { id: "l4", emoji: "🛒", label: "Store", url: "https://shop.example.com", active: true },
    { id: "l5", emoji: "📞", label: "Contact", url: "https://wa.me/6287713714061", active: true }
  ]
};

let links = [];
let adminSession = false; // memory-only session, resets on reload — user must re-enter PIN

/* ================= storage helpers ================= */
async function loadLinks(){
  try{
    const res = await window.storage.get(CONFIG.storageKey, true);
    links = res && res.value ? JSON.parse(res.value) : CONFIG.defaultLinks.slice();
  }catch(e){
    links = CONFIG.defaultLinks.slice();
  }
}
async function saveLinks(){
  try{
    await window.storage.set(CONFIG.storageKey, JSON.stringify(links), true);
  }catch(e){
    showToast("⚠ Gagal menyimpan ke server, perubahan hanya sementara");
  }
}

/* ================= utils ================= */
function uid(){ return "l" + Math.random().toString(36).slice(2,9); }
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
function showToast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>t.classList.remove("show"), 2200);
}
function accentFor(i){ return CONFIG.accentCycle[i % CONFIG.accentCycle.length]; }

/* ================= particle background ================= */
function initParticles(){
  const canvas = document.getElementById("particleCanvas");
  const ctx = canvas.getContext("2d");
  let w, h, particles;
  function resize(){
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
  }
  function makeParticles(){
    const count = Math.min(60, Math.floor(w/22));
    particles = Array.from({length: count}, () => ({
      x: Math.random()*w, y: Math.random()*h,
      r: Math.random()*1.6+0.4,
      vy: Math.random()*0.35+0.08,
      vx: (Math.random()-0.5)*0.15,
      a: Math.random()*0.5+0.15,
      c: Math.random() > 0.5 ? "0,246,255" : "255,43,214"
    }));
  }
  function tick(){
    ctx.clearRect(0,0,w,h);
    particles.forEach(p=>{
      p.y -= p.vy; p.x += p.vx;
      if(p.y < -5){ p.y = h+5; p.x = Math.random()*w; }
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(${p.c},${p.a})`;
      ctx.shadowBlur = 6; ctx.shadowColor = `rgba(${p.c},0.8)`;
      ctx.fill();
    });
    requestAnimationFrame(tick);
  }
  resize(); makeParticles();
  window.addEventListener("resize", ()=>{ resize(); makeParticles(); });
  tick();
}

/* ================= router ================= */
function route(){
  const hash = window.location.hash;
  if(hash === CONFIG.adminRoute){
    adminSession ? renderAdminDashboard() : renderAdminLogin();
  } else {
    renderPublic();
  }
}
window.addEventListener("hashchange", route);

/* ================= PUBLIC PAGE ================= */
function renderPublic(){
  const app = document.getElementById("app");
  const activeLinks = links.filter(l => l.active);
  app.innerHTML = `
    <div class="wrap">
      <div class="avatar-frame">
        <div class="avatar-inner">${CONFIG.profileInitial}</div>
      </div>
      <h1 class="profile-name">${escapeHtml(CONFIG.name)}</h1>
      <p class="profile-bio">${escapeHtml(CONFIG.bio)}</p>
      <div class="status-pill"><span class="status-dot"></span> System Online</div>

      <div class="links">
        ${activeLinks.length ? activeLinks.map((l,i)=>`
          <div class="link-card" style="--accent:${accentFor(i)}">
            <div class="link-emoji">${escapeHtml(l.emoji || "🔗")}</div>
            <div class="link-body">
              <div class="link-label">${escapeHtml(l.label)}</div>
              <div class="link-url">${escapeHtml(l.url)}</div>
            </div>
            <button class="copy-btn" data-url="${escapeHtml(l.url)}" title="Salin link" aria-label="Salin link ${escapeHtml(l.label)}">⧉</button>
            <a href="${escapeHtml(l.url)}" target="_blank" rel="noopener noreferrer" style="position:absolute; inset:0;" aria-label="${escapeHtml(l.label)}"></a>
          </div>
        `).join("") : `<div class="empty-state">// belum ada link aktif //</div>`}
      </div>

      <div class="footer-tag">system <span>v2.0</span> · hanxa.net</div>
    </div>
  `;
  app.querySelectorAll(".copy-btn").forEach(btn=>{
    btn.addEventListener("click", (e)=>{
      e.preventDefault(); e.stopPropagation();
      copyText(btn.dataset.url, btn);
    });
  });
}

function copyText(text, btn){
  const done = ()=>{
    if(btn){
      const old = btn.textContent;
      btn.textContent = "✓"; btn.classList.add("copied");
      setTimeout(()=>{ btn.textContent = old; btn.classList.remove("copied"); }, 1400);
    }
    showToast("Link disalin ke clipboard");
  };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done).catch(()=>fallbackCopy(text, done));
  } else {
    fallbackCopy(text, done);
  }
}
function fallbackCopy(text, cb){
  const ta = document.createElement("textarea");
  ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0";
  document.body.appendChild(ta); ta.select();
  try{ document.execCommand("copy"); }catch(e){}
  document.body.removeChild(ta);
  cb();
}

  app.innerHTML = `
    <div class="login-screen">
      <div class="panel login-card">
        <div class="lock">🔐</div>
        <p class="eyebrow">Restricted Access</p>
        <h2 class="h-title" style="text-align:center;">Admin Terminal</h2>
        <input type="password" inputmode="numeric" maxlength="8" class="pin-input" id="pinInput" placeholder="••••" autofocus>
        <div class="error-msg" id="pinError"></div>
        <button class="btn btn-primary" style="width:100%;" id="pinSubmit">Masuk</button>
        <a class="back-link" href="#" id="backHome">&larr; kembali ke halaman utama</a>
      </div>
    </div>
  `;
  const input = document.getElementById("pinInput");
  const err = document.getElementById("pinError");
  const card = document.querySelector(".login-card");
  function attempt(){
    if(input.value === CONFIG.adminPin){
      adminSession = true;
      err.textContent = "";
      renderAdminDashboard();
    } else {
      err.textContent = "PIN salah. Coba lagi.";
      card.classList.remove("shake"); void card.offsetWidth; card.classList.add("shake");
      input.value = ""; input.focus();
    }
  }
  document.getElementById("pinSubmit").addEventListener("click", attempt);
  input.addEventListener("keydown", e=>{ if(e.key === "Enter") attempt(); });
  document.getElementById("backHome").addEventListener("click", e=>{
    e.preventDefault(); window.location.hash = "";
  });
}

/* ================= ADMIN DASHBOARD ================= */
function renderAdminDashboard(){
  const app = document.getElementById("app");
  app.innerHTML = `
    <div class="admin-topbar">
      <div class="logo">HANXA <span>LINK</span> // ADMIN</div>
      <div style="display:flex; gap:10px;">
        <a class="btn btn-ghost" href="#" id="viewPublic" target="_blank">Lihat halaman</a>
        <button class="btn btn-danger" id="logoutBtn">Keluar</button>
      </div>
    </div>
    <div class="admin-wrap">
      <div class="panel" style="margin-bottom:22px;">
        <p class="eyebrow">Tambah Data</p>
        <h2 class="h-title">Link Baru</h2>
        <form id="addForm" class="add-form">
          <div class="field"><label>Icon</label><input type="text" id="newEmoji" maxlength="4" placeholder="🔗" required></div>
          <div class="field"><label>Nama</label><input type="text" id="newLabel" placeholder="Nama link" required></div>
          <div class="field url-field"><label>URL</label><input type="url" id="newUrl" placeholder="https://" required></div>
          <div class="field submit-field"><button type="submit" class="btn btn-primary">+ Tambah</button></div>
        </form>
      </div>

      <div class="panel">
        <p class="eyebrow">Kelola</p>
        <h2 class="h-title">Daftar Link (${links.length})</h2>
        <div class="row-list" id="rowList"></div>
        <p class="hint">// Perubahan tersimpan otomatis dan terlihat oleh semua pengunjung halaman.<br>// Keamanan: PIN dicek di sisi browser (client-side). Untuk keamanan produksi sesungguhnya, gunakan autentikasi backend. Ganti CONFIG.adminPin &amp; CONFIG.adminRoute di kode sebelum publish.</p>
      </div>
    </div>
  `;
  document.getElementById("viewPublic").addEventListener("click", e=>{
    e.preventDefault();
    window.open(window.location.pathname, "_blank");
  });
  document.getElementById("logoutBtn").addEventListener("click", ()=>{
    adminSession = false;
    window.location.hash = "";
  });
  document.getElementById("addForm").addEventListener("submit", async e=>{
    e.preventDefault();
    const emoji = document.getElementById("newEmoji").value.trim() || "🔗";
    const label = document.getElementById("newLabel").value.trim();
    const url = document.getElementById("newUrl").value.trim();
    if(!label || !url) return;
    links.push({ id: uid(), emoji, label, url, active: true });
    await saveLinks();
    renderAdminDashboard();
    showToast("Link ditambahkan");
  });
  renderRows();
}

function renderRows(){
  const list = document.getElementById("rowList");
  if(!links.length){
    list.innerHTML = `<div class="empty-state">// belum ada link, tambahkan di atas //</div>`;
    return;
  }
  list.innerHTML = links.map((l, i)=>`
    <div class="row-item ${l.active ? "" : "inactive"}" data-id="${l.id}">
      <div class="row-order">
        <button data-act="up" ${i===0 ? "disabled":""} title="Naikkan">▲</button>
        <button data-act="down" ${i===links.length-1 ? "disabled":""} title="Turunkan">▼</button>
      </div>
      <input class="field row-emoji-input" data-field="emoji" value="${escapeHtml(l.emoji)}" maxlength="4">
      <div class="row-fields">
        <input data-field="label" value="${escapeHtml(l.label)}" placeholder="Nama link">
        <input data-field="url" value="${escapeHtml(l.url)}" placeholder="https://">
      </div>
      <label class="switch" title="Aktif / Nonaktif">
        <input type="checkbox" data-field="active" ${l.active ? "checked":""}>
        <span class="slider"></span>
      </label>
      <div class="row-actions">
        <button class="btn btn-danger btn-icon" data-act="delete" title="Hapus">✕</button>
      </div>
    </div>
  `).join("");

  list.querySelectorAll(".row-item").forEach(row=>{
    const id = row.dataset.id;
    row.querySelectorAll("input[data-field]").forEach(inp=>{
      const field = inp.dataset.field;
      const evt = field === "active" ? "change" : "input";
      inp.addEventListener(evt, async ()=>{
        const link = links.find(l=>l.id===id);
        if(!link) return;
        link[field] = field === "active" ? inp.checked : inp.value;
        await saveLinks();
        if(field === "active"){ row.classList.toggle("inactive", !link.active); }
      });
    });
    row.querySelectorAll("button[data-act]").forEach(btn=>{
      btn.addEventListener("click", async ()=>{
        const idx = links.findIndex(l=>l.id===id);
        if(idx === -1) return;
        const act = btn.dataset.act;
        if(act === "delete"){
          links.splice(idx,1);
        } else if(act === "up" && idx>0){
          [links[idx-1], links[idx]] = [links[idx], links[idx-1]];
        } else if(act === "down" && idx<links.length-1){
          [links[idx+1], links[idx]] = [links[idx], links[idx+1]];
        }
        await saveLinks();
        renderAdminDashboard();
      });
    });
  });
}

async function boot(){
  initParticles();
  await loadLinks();
  route();
  const loader = document.getElementById("loader");
  setTimeout(()=>{ loader.classList.add("hide"); }, 700);
}
boot();

})();
